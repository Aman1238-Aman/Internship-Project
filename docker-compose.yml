services:
  postgres:
    image: postgres:16-alpine
    container_name: docflow_postgres
    environment:
      POSTGRES_DB: docflow
      POSTGRES_USER: docflow
      POSTGRES_PASSWORD: docflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: docflow_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: docflow_backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://docflow:docflow@postgres:5432/docflow
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    container_name: docflow_worker
    command: celery -A app.worker.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://docflow:docflow@postgres:5432/docflow
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      FRONTEND_ORIGIN: http://localhost:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: docflow_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
